apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-deploy-demo
  namespace: k8s-demo
  labels:
    app: k8s-deploy-demo
    version: v1
spec:
  replicas: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: k8s-deploy-demo
  template:
    metadata:
      labels:
        app: k8s-deploy-demo
        version: v1
    spec:
      containers:
        - name: app
          image: localhost:5000/k8s-deploy-demo:v1
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_STRATEGY
              value: Recreate
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            timeoutSeconds: 3
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            timeoutSeconds: 3
            initialDelaySeconds: 10
            periodSeconds: 10
