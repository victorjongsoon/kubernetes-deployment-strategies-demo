apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-deploy-demo
  namespace: k8s-demo
  labels:
    app: k8s-deploy-demo
    version: v2
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: k8s-deploy-demo
  template:
    metadata:
      labels:
        app: k8s-deploy-demo
        version: v2
    spec:
      containers:
        - name: app
          image: k8s-deploy-demo:v2
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
          env:
            - name: APP_STRATEGY
              value: RollingUpdate
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
