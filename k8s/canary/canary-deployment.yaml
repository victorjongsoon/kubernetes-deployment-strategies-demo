apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-deploy-demo-canary
  namespace: k8s-demo
  labels:
    app: k8s-deploy-demo
    version: v2
    track: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-deploy-demo
      track: canary
  template:
    metadata:
      labels:
        app: k8s-deploy-demo
        version: v2
        track: canary
    spec:
      containers:
        - name: app
          image: localhost:5000/k8s-deploy-demo:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: APP_COLOR
              value: orange
            - name: APP_STRATEGY
              value: Canary
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5000
            timeoutSeconds: 3
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5000
            timeoutSeconds: 3
            initialDelaySeconds: 10
            periodSeconds: 10
